<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container{
        height: 100vh;
        width: 100%;
        background-image: linear-gradient(120deg, #f093fb 0%, #f5576c 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        }



        .innercontainer{
            background-color: rgb(124, 3, 58);
            height: 500px;
            width: 1000px;
            display: flex;
            gap: 0;
            border: 2px solid black;
            position: relative;
            overflow: hidden;
        }

        .innercontainer::before{
            content: "";                  /* required hai ye line */
            position: absolute;          /* required hai ye line */
            width: 100%;
            height: 100%;
            left: -100%;
            background-color: rgba(0, 0, 0, 0.5); /* Adjust the overlay color and opacity */
            transition: left 5s ease; /* Add transition for smooth animation */
        }

        .innercontainer:hover::before{
            left: 0%;
        }

        .leftbox{
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
            color: white;
            align-items: center;
        }

        .rightbox{
            background-image: url('randomimg.jpg');
            height: 100%;
            width: 50%;
            background-size: 100% 100%;
            
        }

        #heading h2{
            text-align: center;
            padding: 60px 30px 30px 20px;;
            font-size: 3rem;
            
        }

        #content{
            text-align: center;
            font-size: 1.2rem;
            width: 80%;
            padding-top: 30px;
        }

        #statsBox{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 80%;
            padding-top: 55px;
        }

        #number{
            font-size: 1.8rem;
            font-weight: bold;
        }

        #units{
            font-size:smaller;
        }
    
    </style>
</head>
<body>
    <div class="container">
        <div class="innercontainer">
            <div class="leftbox">
                <div id="heading">
                    <h2>Welcome To the goofy Gang!!</h2>
                </div>
                <div id="content">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Optio non debitis perspiciatis ratione, ullam doloremque iste numquam hic in ea.</p>
                </div>
                <div id="statsBox">
                        <div>
                            <div id="number">
                                10K+
                            </div>
                            <div id="unit">
                                Comments
                            </div>
                        </div>

                        <div>
                            <div id="number">
                                214
                            </div>
                            <div id="unit">
                                Paid Users
                            </div>
                        </div>

                        <div>
                            <div id="number">
                                12M+
                            </div>
                            <div id="unit">
                                Views
                            </div>
                        </div>
    
                    </div>
                </div>
            <div class="rightbox">
                
            </div>
        </div>
    </div>
</body>
</html>
